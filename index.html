        function initApp() {
            renderNavMenu();
            
            // 初始化 ECharts 實例
            const chartDom = document.getElementById('echarts-container');
            chartInstance = echarts.init(chartDom);
            
            // 監聽視窗大小改變，重繪圖表
            window.addEventListener('resize', () => {
                if (chartInstance) chartInstance.resize();
            });

            // 載入第一張投影片
            loadSlide(0);
        }

        function renderNavMenu() {
            const menu = document.getElementById('nav-menu');
            let currentChapter = "";
            let html = "";

            presentationData.forEach((item, index) => {
                if (item.chapter !== currentChapter) {
                    currentChapter = item.chapter;
                    html += `<div class="text-xs font-bold text-slate-500 uppercase mt-4 mb-2 tracking-wider">${currentChapter}</div>`;
                }
                html += `
                    <button id="nav-btn-${index}" onclick="loadSlide(${index})" 
                            class="w-full text-left px-3 py-2 rounded text-sm transition-colors nav-btn text-slate-400 hover:bg-slate-800 hover:text-white">
                        <span class="inline-block w-5 text-slate-500">${index + 1}.</span> ${item.title}
                    </button>
                `;
            });
            menu.innerHTML = html;
        }

        function loadSlide(index) {
            if (index < 0 || index >= presentationData.length) return;
            currentSlide = index;
            const data = presentationData[index];

            // 更新導航 UI
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'font-semibold');
                btn.classList.add('text-slate-400');
            });
            const activeBtn = document.getElementById(`nav-btn-${index}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-400', 'hover:bg-slate-800');
                activeBtn.classList.add('bg-blue-600', 'text-white', 'font-semibold');
            }

            // 更新內容 UI 並觸發動畫
            const container = document.getElementById('content-container');
            container.classList.remove('slide-enter');
            void container.offsetWidth; // 觸發重繪 (Reflow) 以重置動畫
            container.classList.add('slide-enter');

            document.getElementById('slide-chapter').innerText = data.chapter;
            document.getElementById('slide-title').innerText = data.title;
            document.getElementById('slide-core').innerText = data.core;
            
            const logicList = document.getElementById('slide-logic');
            logicList.innerHTML = data.logic.map(item => `<li>${item}</li>`).join('');
            
            document.getElementById('slide-deepdive').innerText = data.deepDive;
            document.getElementById('slide-hook').innerText = data.hook;
            document.getElementById('chart-title').innerText = data.chartTitle;

            // 渲染圖表
            if (chartInstance) {
                chartInstance.clear();
                data.renderChart(chartInstance);
            }
        }

        function nextSlide() {
            if (currentSlide < presentationData.length - 1) loadSlide(currentSlide + 1);
        }

        function prevSlide() {
            if (currentSlide > 0) loadSlide(currentSlide - 1);
        }

        // 啟動應用
        window.onload = initApp;
